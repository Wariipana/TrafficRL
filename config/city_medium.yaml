# 8x8 grid — validacion Fase 1, ~64 intersecciones, ~50 semaforos
city:
  grid_width: 8
  grid_height: 8
  block_size: 100.0
  avenue_probability: 0.25
  street_probability: 0.75
  residential_ratio: 0.5
  commercial_ratio: 0.35
  industrial_ratio: 0.15
  traffic_light_density: 0.75
  seed: 42

simulation:
  max_vehicles: 500
  spawn_rate_base: 1.5
  episode_length_steps: 2000
  dt: 0.1

observation_mode: "perfect"
communication_mode: "none"
shm_prefix: "trafficrl"
